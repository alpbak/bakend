name: SDK Publish

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    tags:
      - "sdk-dart-v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  id-token: write # Required for pub.dev OIDC on tag push

jobs:
  npm:
    name: Publish @bakend/client to npm
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Require NPM_TOKEN
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not configured"
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Resolve package version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
            version="${version#v}"
          else
            version=$(node -p "require('./sdk/javascript/package.json').version")
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Skip if version already on npm
        id: npm_check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if npm view "@bakend/client@${{ steps.version.outputs.version }}" version 2>/dev/null; then
            echo "Version ${{ steps.version.outputs.version }} is already on npm — skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync SDK version
        if: steps.npm_check.outputs.skip != 'true'
        working-directory: sdk/javascript
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build JavaScript SDK
        if: steps.npm_check.outputs.skip != 'true'
        working-directory: sdk/javascript
        run: |
          npm install typescript --no-save
          npm run build

      - name: Publish to npm
        if: steps.npm_check.outputs.skip != 'true'
        working-directory: sdk/javascript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public || {
            code=$?
            if grep -q EOTP /home/runner/.npm/_logs/*-debug-0.log 2>/dev/null; then
              echo "::error::npm requires 2FA (EOTP). Create a granular Automation token with"
              echo "::error::\"Bypass two-factor authentication\" enabled and update NPM_TOKEN."
            fi
            exit $code
          }

  pubdev:
    name: Publish bakend to pub.dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1

      - name: Configure pub.dev credentials (manual / release)
        if: github.event_name != 'push'
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}
        run: |
          if [ -z "$PUB_CREDENTIALS" ]; then
            echo "::error::PUB_CREDENTIALS secret is empty or not set."
            echo "::error::After 'dart pub token add https://pub.dev', copy the FULL file:"
            echo "::error::  cat \"\$HOME/.config/dart/pub-credentials.json\""
            echo "::error::Or enable GitHub Actions publishing on pub.dev and push tag sdk-dart-v{version}."
            exit 1
          fi
          mkdir -p "$HOME/.config/dart"
          printf '%s' "$PUB_CREDENTIALS" > "$HOME/.config/dart/pub-credentials.json"
          chmod 600 "$HOME/.config/dart/pub-credentials.json"
          python3 -c "import json; json.load(open('$HOME/.config/dart/pub-credentials.json'))"

      - name: Resolve package version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
            version="${version#v}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            version="${GITHUB_REF_NAME#sdk-dart-v}"
          else
            version=$(grep '^version:' sdk/dart/pubspec.yaml | awk '{print $2}')
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Sync SDK version
        working-directory: sdk/dart
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version }}/" pubspec.yaml

      - name: Dry run publish
        working-directory: sdk/dart
        run: dart pub publish --dry-run

      - name: Publish to pub.dev
        working-directory: sdk/dart
        run: dart pub publish --force
