name: SDK Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm:
    name: Publish @bakend/client to npm
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Require NPM_TOKEN
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN secret is not configured"
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Resolve package version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
            version="${version#v}"
          else
            version=$(node -p "require('./sdk/javascript/package.json').version")
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Sync SDK version
        working-directory: sdk/javascript
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build JavaScript SDK
        working-directory: sdk/javascript
        run: |
          npm install typescript --no-save
          npm run build

      - name: Publish to npm
        working-directory: sdk/javascript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  pubdev:
    name: Publish bakend to pub.dev
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Require PUB_CREDENTIALS
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}
        run: |
          if [ -z "$PUB_CREDENTIALS" ]; then
            echo "PUB_CREDENTIALS secret is not configured"
            exit 1
          fi

      - uses: dart-lang/setup-dart@v1

      - name: Resolve package version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
            version="${version#v}"
          else
            version=$(grep '^version:' sdk/dart/pubspec.yaml | awk '{print $2}')
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Sync SDK version
        working-directory: sdk/dart
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version }}/" pubspec.yaml

      - name: Dry run publish
        working-directory: sdk/dart
        run: dart pub publish --dry-run

      - name: Publish to pub.dev
        working-directory: sdk/dart
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}
        run: dart pub publish --force
