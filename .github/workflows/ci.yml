name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-check:
    name: Documentation structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify required documentation paths
        run: |
          required_paths=(
            AGENTS.md
            docs/README.md
            docs/ARCHITECTURE.md
            docs/TECH-STACK.md
            docs/user-guide/getting-started.md
            docs/user-guide/installation.md
            tutorials/README.md
            docs/api/rest-api.md
            docs/sdk/javascript.md
            docs/llm/product-overview.md
            docs/llm/architecture-summary.md
            docs/rfcs/README.md
          )
          for path in "${required_paths[@]}"; do
            if [ ! -f "$path" ]; then
              echo "Missing required file: $path"
              exit 1
            fi
          done
          echo "All required documentation paths exist."

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck

  sdk-registry-check:
    name: SDK publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
      - uses: dart-lang/setup-dart@v1
      - name: JavaScript SDK pack check
        working-directory: sdk/javascript
        run: |
          npm install typescript --no-save
          npm run build
          npm pack --dry-run
      - name: Dart SDK publish dry-run
        working-directory: sdk/dart
        run: dart pub publish --dry-run

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
      - run: bun install
      - run: bun run sdk:build
      - name: bak init smoke test
        run: |
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          bun run "$GITHUB_WORKSPACE/src/index.ts" init smokeapp
          test -f smokeapp/bakend.json
      - run: bun test

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
      - run: bun install
      - run: cd dashboard && bun install
      - run: bun run dashboard:build
      - run: bun run dashboard:check

  packaging:
    name: Packaging build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
      - run: bun install
      - run: cd dashboard && bun install
      - run: bun run build:linux-x64
      - run: test -x dist/bak

  website:
    name: Website build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest
      - name: Build Astro site
        working-directory: website
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
        run: |
          bun install
          bun run build
      - run: test -d website/dist
      - run: test -f website/dist/install.sh
